name: Deploy to VPS

# Runs on every push to main (and can be triggered manually from the Actions tab).
# It copies the source to the VPS over SSH and builds + restarts the app there.
# The VPS keeps its own .env (never uploaded), so server secrets stay off GitHub.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT || '22' }}" -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload source to VPS
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude '.output' \
            --exclude 'dist' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VPS_PORT || '22' }}" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/ferasha/"

      - name: Build and restart on VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT || '22' }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'bash /var/www/ferasha/deploy/remote-build.sh'
