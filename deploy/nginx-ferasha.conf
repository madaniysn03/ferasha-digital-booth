# Reverse proxy for Ferasha Quantic.
# Put this at /etc/nginx/sites-available/ferasha and symlink into sites-enabled.
# Replace VOTRE_DOMAINE.com with your real domain before enabling.
# Certbot will automatically add the HTTPS (443) server block when you run it.

server {
    listen 80;
    listen [::]:80;
    server_name ferashaquantic.ma www.ferashaquantic.ma;

    # Allow larger uploads (logos / listing images go straight to Supabase Storage,
    # but keep some headroom for form posts).
    client_max_body_size 15M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
